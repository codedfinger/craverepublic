kind = "web"
previewPath = "/"
title = "Crave Republic"
version = "1.0.0"
id = "artifacts/crave-republic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22249

[services.development]
run = "pnpm --filter @workspace/crave-republic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crave-republic", "run", "build" ]
publicDir = "artifacts/crave-republic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22249"
BASE_PATH = "/"
